<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelly Surprise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a1a; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(233, 69, 96, 0.3);
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }
    .ui-left, .ui-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .creature-display {
      font-size: 28px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .essence-counter {
      background: rgba(0,0,0,0.4);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }
    #evolution-bar-container {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 24px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 4px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    #evolution-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      transition: width 0.3s ease;
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
    }
    #evolution-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }
    #modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    #modal-overlay.show { display: flex; }
    #modal-emoji { font-size: 80px; }
    #modal-title {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px currentColor;
    }
    #modal-subtitle { color: #aaa; font-size: 16px; }
    #modal-button {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 18px;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #modal-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
    }
    .menu-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .menu-screen.active {
      display: flex;
      opacity: 1;
    }
    #main-menu {
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
    }
    .menu-title {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(135deg, #e94560, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 30px;
    }
    .menu-subtitle {
      font-size: 18px;
      color: #888;
      margin-bottom: 20px;
    }
    .menu-btn {
      padding: 15px 50px;
      font-size: 20px;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      min-width: 200px;
    }
    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
    }
    .menu-btn.secondary {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .menu-btn.secondary:hover {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .menu-btn.danger {
      background: linear-gradient(135deg, #dc3545, #ff4444);
    }
    .menu-btn.danger:hover {
      box-shadow: 0 0 30px rgba(220, 53, 69, 0.6);
    }
    #settings-screen, #catalog-screen, #pause-screen {
      background: rgba(10, 10, 26, 0.95);
    }
    .screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin-bottom: 30px;
    }
    .screen-title {
      font-size: 32px;
      font-weight: bold;
      color: #fff;
    }
    .back-btn {
      padding: 10px 20px;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }
    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .settings-label {
      font-size: 16px;
      color: #fff;
    }
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      max-width: 500px;
      max-height: 350px;
      overflow-y: auto;
      padding: 10px;
    }
    .catalog-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .catalog-item.undiscovered {
      opacity: 0.3;
      filter: grayscale(1);
    }
    .catalog-emoji {
      font-size: 40px;
    }
    .catalog-name {
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
    .confirm-modal {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 200;
    }
    .confirm-modal.show { display: flex; }
    .confirm-title {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
    }
    .confirm-message {
      font-size: 16px;
      color: #aaa;
    }
    .confirm-buttons {
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }
    #game-canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div class="ui-left">
        <span class="creature-display" id="creature-emoji">🫧</span>
        <span id="creature-name">Baby Jelly</span>
      </div>
      <div class="ui-right">
        <span class="essence-counter" id="essence-counter">Essence: 0</span>
        <span class="essence-counter" id="creature-count">Found: 0/5</span>
      </div>
    </div>
    <div id="evolution-bar-container">
      <div id="evolution-bar-fill" style="width: 0%"></div>
    </div>
    <div id="evolution-text">0 / 10 Essence</div>
    <div id="modal-overlay">
      <div id="modal-emoji">🔥</div>
      <div id="modal-title">You became a FIRE JELLY!</div>
      <div id="modal-subtitle">A new creature has awakened</div>
      <button id="modal-button">Continue</button>
    </div>
    <div id="main-menu" class="menu-screen active">
      <div class="menu-title">Jelly Surprise</div>
      <div class="menu-subtitle">A cozy creature evolution game</div>
      <button class="menu-btn" id="btn-start">Start Game</button>
      <button class="menu-btn secondary" id="btn-catalog">Creature Catalog</button>
      <button class="menu-btn secondary" id="btn-settings">Settings</button>
    </div>
    <div id="settings-screen" class="menu-screen">
      <div class="screen-header">
        <div class="screen-title">Settings</div>
        <button class="back-btn" id="btn-settings-back">Back</button>
      </div>
      <div class="settings-list">
        <div class="settings-item">
          <span class="settings-label">Version</span>
          <span class="settings-label" style="color: #888;">1.0.0</span>
        </div>
        <button class="menu-btn danger" id="btn-reset">Reset Progress</button>
      </div>
    </div>
    <div id="catalog-screen" class="menu-screen">
      <div class="screen-header">
        <div class="screen-title">Creature Catalog</div>
        <button class="back-btn" id="btn-catalog-back">Back</button>
      </div>
      <div class="catalog-grid" id="catalog-grid"></div>
    </div>
    <div id="pause-screen" class="menu-screen">
      <div class="screen-title" style="margin-bottom: 30px;">Paused</div>
      <button class="menu-btn" id="btn-resume">Resume</button>
      <button class="menu-btn secondary" id="btn-pause-catalog">Creature Catalog</button>
      <button class="menu-btn secondary" id="btn-pause-settings">Settings</button>
      <button class="menu-btn secondary" id="btn-pause-main">Main Menu</button>
    </div>
    <div id="confirm-modal" class="confirm-modal">
      <div class="confirm-title">Reset Progress?</div>
      <div class="confirm-message">This will delete all your saved data.<br>This action cannot be undone.</div>
      <div class="confirm-buttons">
        <button class="menu-btn secondary" id="btn-confirm-cancel">Cancel</button>
        <button class="menu-btn danger" id="btn-confirm-reset">Reset</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
