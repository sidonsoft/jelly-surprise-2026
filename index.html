<!DOCTYPE html>

      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      border-radius: 12px;

    #ui-overlay {

    }
    #evolution-bar-container {

      height: 24px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 4px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    #evolution-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      transition: width 0.3s ease;
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
    }
    #evolution-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }
    #modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    #modal-overlay.show { display: flex; }
    #modal-emoji { font-size: 80px; }
    #modal-title {

      font-weight: bold;
      color: #fff;

      color: #fff;

    #modal-button:hover {

    }
    #loading-overlay {

      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 30px;
      z-index: 200;
      transition: opacity 0.5s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-emoji { font-size: 60px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    #loading-text {
      font-size: 24px;
      font-weight: bold;
      color: #e94560;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);

      border-radius: 3px;

    }
    #loading-bar {

      width: 0%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
