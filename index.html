<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelly Surprise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a1a; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(233, 69, 96, 0.3);
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }
    .ui-left, .ui-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .creature-display {
      font-size: 28px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .essence-counter {
      background: rgba(0,0,0,0.4);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }
    #evolution-bar-container {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 24px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 4px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    #evolution-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      transition: width 0.3s ease;
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
    }
    #evolution-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
    }
    #modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }
    #modal-overlay.show { display: flex; }
    #modal-emoji { font-size: 80px; }
    #modal-title {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px currentColor;
    }
    #modal-subtitle { color: #aaa; font-size: 16px; }
    #modal-ability { color: #9b59b6; font-size: 14px; font-style: italic; margin-top: -10px; }
    #modal-button {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 18px;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #modal-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
    }
    #reset-btn {
      position: fixed;
      bottom: 60px;
      right: 20px;
      padding: 8px 16px;
      font-size: 12px;
      background: rgba(231, 76, 60, 0.8);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
    }
    #reset-btn:hover {
      opacity: 1;
      transform: scale(1.05);
    }
    #confirm-dialog {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 15px;
      z-index: 200;
    }
    #confirm-dialog.show { display: flex; }
    #confirm-dialog p { font-size: 18px; color: #fff; }
    .dialog-buttons { display: flex; gap: 15px; }
    .dialog-btn {
      padding: 10px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .dialog-btn:hover { transform: scale(1.05); }
    #confirm-yes { background: #e74c3c; color: #fff; }
    #confirm-no { background: #555; color: #fff; }

    #catalog-btn {
      padding: 8px 16px;
      font-size: 12px;
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
      border: none;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #catalog-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(155, 89, 182, 0.6);
    }

    #catalog-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 150;
    }
    #catalog-overlay.show { display: flex; }
    #catalog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
      padding: 0 10px;
    }
    #catalog-title {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
    }
    #catalog-progress {
      font-size: 14px;
      color: #aaa;
      background: rgba(0,0,0,0.4);
      padding: 6px 14px;
      border-radius: 15px;
    }
    #catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 600px;
      max-height: 350px;
      overflow-y: auto;
      padding: 10px;
    }
    .catalog-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
    }
    .catalog-card:hover {
      transform: scale(1.05);
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
    }
    .catalog-card.discovered {
      border-color: rgba(155, 89, 182, 0.5);
    }
    .catalog-card.undiscovered {
      opacity: 0.6;
    }
    .catalog-card-emoji {
      font-size: 36px;
      line-height: 1;
    }
    .catalog-card-silhouette {
      width: 36px;
      height: 36px;
      background: rgba(100,100,100,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .catalog-card-name {
      font-size: 12px;
      color: #fff;
      text-align: center;
    }
    .catalog-card-element {
      font-size: 10px;
      color: #aaa;
    }
    .catalog-card.locked .catalog-card-name {
      color: #666;
    }
    #catalog-close {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #catalog-close:hover {
      background: rgba(255,255,255,0.2);
    }

    #catalog-detail-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 200;
    }
    #catalog-detail-overlay.show { display: flex; }
    #catalog-detail-emoji { font-size: 64px; }
    #catalog-detail-name {
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      margin-top: 10px;
    }
    #catalog-detail-element {
      font-size: 14px;
      color: #aaa;
      margin-top: 5px;
    }
    #catalog-detail-ability {
      font-size: 14px;
      color: #9b59b6;
      font-style: italic;
      margin-top: 15px;
      text-align: center;
      max-width: 300px;
    }
    #catalog-detail-close {
      margin-top: 25px;
      padding: 10px 30px;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #catalog-detail-close:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay">
      <div class="ui-left">
        <span class="creature-display" id="creature-emoji">🫧</span>
        <span id="creature-name">Baby Jelly</span>
      </div>
      <div class="ui-right">
        <span class="essence-counter" id="essence-counter">Essence: 0</span>
        <span class="essence-counter" id="creature-count">Found: 0/5</span>
        <button id="catalog-btn">Catalog</button>
      </div>
    </div>
    <div id="evolution-bar-container">
      <div id="evolution-bar-fill" style="width: 0%"></div>
    </div>
    <div id="evolution-text">0 / 10 Essence</div>
    <div id="modal-overlay">
      <div id="modal-emoji">🔥</div>
      <div id="modal-title">You became a FIRE JELLY!</div>
      <div id="modal-subtitle">A new creature has awakened</div>
      <div id="modal-ability"></div>
      <button id="modal-button">Continue</button>
    </div>
    <button id="reset-btn">Reset Progress</button>
    <div id="confirm-dialog">
      <p>Are you sure you want to reset all progress?</p>
      <div class="dialog-buttons">
        <button id="confirm-yes" class="dialog-btn">Yes, Reset</button>
        <button id="confirm-no" class="dialog-btn">Cancel</button>
      </div>
    </div>
    <div id="catalog-overlay">
      <div id="catalog-header">
        <span id="catalog-title">Creature Catalog</span>
        <span id="catalog-progress">0/5 Discovered</span>
      </div>
      <div id="catalog-grid"></div>
      <button id="catalog-close">Close</button>
    </div>
    <div id="catalog-detail-overlay">
      <div id="catalog-detail-emoji"></div>
      <div id="catalog-detail-name"></div>
      <div id="catalog-detail-element"></div>
      <div id="catalog-detail-ability"></div>
      <button id="catalog-detail-close">Back</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
